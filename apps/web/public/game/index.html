<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>geome</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #04040a;
        color: #e5e5e5;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
      }
      #game {
        display: block;
        width: 100%;
        height: 100%;
        cursor: pointer;
      }
      .ui {
        position: fixed;
        pointer-events: none;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.85);
      }
      #topbar {
        top: 0;
        left: 0;
        right: 0;
        padding: 14px 22px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 14px;
        font-size: 14px;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: #cbd5e1;
      }
      #attempt {
        background: rgba(8, 8, 18, 0.55);
        backdrop-filter: blur(8px);
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      #percent {
        font-variant-numeric: tabular-nums;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: 0.03em;
      }
      #progress {
        position: fixed;
        top: 0;
        left: 0;
        height: 3px;
        background: linear-gradient(90deg, #22d3ee, #a855f7, #ec4899);
        width: 0%;
        box-shadow: 0 0 14px #22d3ee;
        transition: width 80ms linear;
      }
      #toast {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.92);
        font-size: 56px;
        font-weight: 900;
        letter-spacing: 0.05em;
        text-shadow: 0 0 32px currentColor;
        opacity: 0;
        transition: all 280ms cubic-bezier(.34,1.56,.64,1);
        pointer-events: none;
      }
      #toast.show {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      #hint {
        position: fixed;
        bottom: 14px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.35);
        pointer-events: none;
      }
      #pause {
        position: fixed;
        inset: 0;
        background: rgba(4, 4, 10, 0.7);
        backdrop-filter: blur(10px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      #pause.show { display: flex; }
      .panel {
        background: rgba(15, 15, 25, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        padding: 28px 36px;
        text-align: center;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      }
      .panel h2 {
        margin: 0 0 6px;
        font-size: 32px;
        background: linear-gradient(90deg, #22d3ee, #a855f7);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .panel p { color: rgba(255,255,255,0.65); margin: 4px 0 16px; font-size: 13px; }
      .panel .stat { font-variant-numeric: tabular-nums; font-size: 14px; color: rgba(255,255,255,0.85); }
      .panel button {
        margin-top: 16px;
        background: linear-gradient(90deg, #22d3ee, #a855f7);
        border: 0;
        color: #04040a;
        padding: 10px 22px;
        border-radius: 999px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        font-size: 14px;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }
      .panel button:hover { transform: translateY(-1px); }
      .keys {
        display: inline-flex;
        gap: 6px;
        margin-top: 14px;
        font-size: 11px;
        color: rgba(255,255,255,0.5);
      }
      .keys kbd {
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 4px;
        padding: 2px 6px;
        font-family: ui-monospace, monospace;
      }
      #mode-tag {
        position: fixed;
        bottom: 36px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.4);
        opacity: 0;
        transition: opacity 240ms;
      }
      #mode-tag.show { opacity: 1; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="progress"></div>
    <div id="topbar" class="ui">
      <span id="attempt">Attempt 1</span>
      <span id="percent">0.0%</span>
    </div>
    <div id="toast" class="ui"></div>
    <div id="mode-tag"></div>
    <div id="hint">Space · Click · Tap to jump &nbsp;·&nbsp; R restart &nbsp;·&nbsp; P practice &nbsp;·&nbsp; Esc pause</div>
    <div id="pause">
      <div class="panel">
        <h2>Paused</h2>
        <p class="stat">Best this session: <span id="best">0.0%</span></p>
        <p class="stat">Attempts: <span id="att2">1</span></p>
        <button id="resume">Resume</button>
        <div class="keys">
          <span><kbd>Space</kbd> jump</span>
          <span><kbd>R</kbd> restart</span>
          <span><kbd>P</kbd> practice</span>
        </div>
      </div>
    </div>
    <script type="module" src="./game.js?v=3"></script>
  </body>
</html>
